<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пекарня</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#122840" />
    <script>
      // Показуємо помилку якщо React крашиться
      window.addEventListener('error', function(e) {
        var el = document.getElementById('root')
        if (el && !el.children.length) {
          el.innerHTML = '<div style="padding:2rem;font-family:sans-serif;color:#721c24;background:#fdf0ef;border:1px solid #f5c6cb;border-radius:8px;margin:2rem">'
            + '<b>Помилка завантаження:</b><br>' + e.message
            + '<br><br><small>' + (e.filename || '') + ':' + (e.lineno || '') + '</small></div>'
        }
      })
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('root')
        if (el && !el.children.length) {
          el.innerHTML = '<div style="padding:2rem;font-family:sans-serif;color:#721c24;background:#fdf0ef;border:1px solid #f5c6cb;border-radius:8px;margin:2rem">'
            + '<b>Помилка (Promise):</b><br>' + (e.reason || e) + '</div>'
        }
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Fallback для браузерів без підтримки ES-модулів (iOS < 10.3, старий Android) -->
    <script nomodule>
      document.getElementById('root').innerHTML =
        '<div style="padding:2rem;font-family:sans-serif;text-align:center">'
        + '<h2>Браузер застарів</h2>'
        + '<p>Для роботи потрібен Safari 10.3+ (iOS 10.3+) або Chrome 61+.</p>'
        + '<p>Будь ласка, оновіть браузер або операційну систему.</p>'
        + '</div>'
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
